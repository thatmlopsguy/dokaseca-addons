apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: alertmanager-charts
  namespace: alertmanager-addon
spec:
  subscriptions:
    # Watch the Alertmanager Helm chart for new versions
    - chart:
        repoURL: https://prometheus-community.github.io/helm-charts
        name: alertmanager
        semverConstraint: ">=1.0.0"

