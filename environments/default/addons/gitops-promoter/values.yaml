## String to partially override chart.fullname template (will maintain the release name)
##
# nameOverride: ""

## String to fully override chart.fullname template
##
# fullnameOverride: ""

## Configure the controller manager deployment
##
manager:
  replicas: 1

  image:
    repository: quay.io/argoprojlabs/gitops-promoter
    # Leave tag empty so it isn't hardcoded here. Set via an overlay
    # or values override at deploy time (for example: --set manager.image.tag=...)
    tag: ""
    pullPolicy: IfNotPresent

  ## Arguments
  ##
  args:
    - --leader-elect

  ## Environment variables
  ##
  env: []

  ## Image pull secrets
  ##
  imagePullSecrets: []

  ## Pod-level security settings
  ##
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  ## Container-level security settings
  ##
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  ## Resource limits and requests
  ##
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi

  ## Manager pod's affinity
  ##
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: manager
            topologyKey: kubernetes.io/hostname
          weight: 100
        - podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: deployment
            topologyKey: kubernetes.io/hostname
          weight: 5

  ## Manager pod's node selector
  ##
  nodeSelector: {}

  ## Manager pod's tolerations
  ##
  tolerations: []

## Helper RBAC roles for managing custom resources
##
rbacHelpers:
  # Install convenience admin/editor/viewer roles for CRDs
  enable: false

## Custom Resource Definitions
##
crd:
  # Install CRDs with the chart
  enable: true
  # Keep CRDs when uninstalling
  keep: true

## Controller metrics endpoint.
## Enable to expose /metrics endpoint with RBAC protection.
##
metrics:
  enable: true
  # Metrics server port
  port: 8080

## Cert-manager integration for TLS certificates.
## Required for webhook certificates and metrics endpoint certificates.
##
certManager:
  enable: true

## Prometheus ServiceMonitor for metrics scraping.
## Requires prometheus-operator to be installed in the cluster.
##
prometheus:
  enable: false

# BEGIN controllerConfiguration
# Synced from upstream gitops-promoter config/config/controllerconfiguration.yaml
# (do not edit manually; run hack/update-controllerconfiguration.sh)
controllerConfiguration:
  promotionStrategy:
    workQueue:
      maxConcurrentReconciles: 10
      requeueDuration: "5m"
      rateLimiter:
        maxOf:
          - bucket:
              qps: 10
              bucket: 100
          - fastSlow:
              fastDelay: "1s"
              slowDelay: "5m"
              maxFastAttempts: 3
  changeTransferPolicy:
    workQueue:
      maxConcurrentReconciles: 10
      requeueDuration: "5m"
      rateLimiter:
        maxOf:
          - bucket:
              qps: 10
              bucket: 100
          - fastSlow:
              fastDelay: "1s"
              slowDelay: "5m"
              maxFastAttempts: 3
  pullRequest:
    workQueue:
      maxConcurrentReconciles: 10
      requeueDuration: "5m"
      rateLimiter:
        maxOf:
          - bucket:
              qps: 10
              bucket: 100
          - fastSlow:
              fastDelay: "1s"
              slowDelay: "5m"
              maxFastAttempts: 3
    template:
      title: "Promote {{ trunc 5 .ChangeTransferPolicy.Status.Proposed.Dry.Sha }} to `{{ .ChangeTransferPolicy.Spec.ActiveBranch }}`"
      description: "This PR is promoting the environment branch `{{ .ChangeTransferPolicy.Spec.ActiveBranch }}` which is currently on dry sha {{ .ChangeTransferPolicy.Status.Active.Dry.Sha }} to dry sha {{ .ChangeTransferPolicy.Status.Proposed.Dry.Sha }}."
  commitStatus:
    workQueue:
      maxConcurrentReconciles: 10
      requeueDuration: "5m"
      rateLimiter:
        maxOf:
          - bucket:
              qps: 10
              bucket: 100
          - fastSlow:
              fastDelay: "1s"
              slowDelay: "5m"
              maxFastAttempts: 3
  argocdCommitStatus:
    watchLocalApplications: true
    workQueue:
      maxConcurrentReconciles: 10
      requeueDuration: "5m"
      rateLimiter:
        maxOf:
          - bucket:
              qps: 10
              bucket: 100
          - fastSlow:
              fastDelay: "1s"
              slowDelay: "5m"
              maxFastAttempts: 3
  timedCommitStatus:
    workQueue:
      maxConcurrentReconciles: 10
      requeueDuration: "5m"
      rateLimiter:
        maxOf:
          - bucket:
              qps: 10
              bucket: 100
          - fastSlow:
              fastDelay: "1s"
              slowDelay: "5m"
              maxFastAttempts: 3
  gitCommitStatus:
    workQueue:
      maxConcurrentReconciles: 10
      requeueDuration: "5m"
      rateLimiter:
        maxOf:
          - bucket:
              qps: 10
              bucket: 100
          - fastSlow:
              fastDelay: "1s"
              slowDelay: "5m"
              maxFastAttempts: 3
  webRequestCommitStatus:
    workQueue:
      maxConcurrentReconciles: 10
      requeueDuration: "5m"
      rateLimiter:
        maxOf:
          - bucket:
              qps: 10
              bucket: 100
          - fastSlow:
              fastDelay: "1s"
              slowDelay: "5m"
              maxFastAttempts: 3
# END controllerConfiguration

webhook:
  enable: true
