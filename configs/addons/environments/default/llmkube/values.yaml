# Default values for llmkube.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Namespace to deploy the controller
namespace: llmkube-system

# Controller manager configuration
controllerManager:
  # Controller image
  image:
    # Registry for the controller image. When set, prepended to repository.
    # Useful for air-gapped or enterprise proxy registries.
    # Example: "my-registry.company.com"
    registry: ""
    repository: ghcr.io/defilantech/llmkube-controller
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion.
    tag: ""
    # Image digest (sha256:...) - takes precedence over tag when set.
    # Use digests for production deployments to ensure immutable, verifiable images.
    # Example: sha256:abc123def456...
    digest: ""

  # Number of controller replicas (recommended: 1 for active/passive HA)
  replicaCount: 1

  # Leader election configuration
  leaderElection:
    enabled: true

  # Resource limits and requests
  resources:
    limits:
      cpu: 500m
      memory: 2Gi
    requests:
      cpu: 10m
      memory: 512Mi

  # Security context for the controller pod
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  # Security context for the manager container
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - "ALL"

  # Health probe configuration
  livenessProbe:
    httpGet:
      path: /healthz
      port: 8081
    initialDelaySeconds: 15
    periodSeconds: 20

  readinessProbe:
    httpGet:
      path: /readyz
      port: 8081
    initialDelaySeconds: 5
    periodSeconds: 10

  # Node affinity for multi-architecture support
  nodeSelector: {}

  tolerations: []

  affinity: {}

  # Container image used for the model downloader init container
  initContainer:
    registry: ""
    repository: docker.io/curlimages/curl
    tag: "8.18.0"
    # Default fsGroup applied to the rendered PodSecurityContext when the
    # InferenceService does not provide its own Spec.PodSecurityContext.
    # 102 matches curlimages/curl curl_group GID and lets the init container
    # write to a freshly-provisioned PVC on storage classes that initialize
    # volumes as root:root 0755 (e.g., Longhorn, OpenShift restricted-v2).
    #
    # Set to 0 on OpenShift, where the restricted-v2 SCC injects fsGroup
    # from the namespace's allocated range and rejects pods with explicit
    # values outside that range.
    defaultFSGroup: 102

  # Additional environment variables
  env: []

# Service account configuration
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# RBAC configuration
rbac:
  # Specifies whether RBAC resources should be created
  create: true

# Metrics service configuration
metrics:
  # Enable metrics endpoint
  enabled: true
  # Serve metrics over HTTPS with authn/authz (true) or plain HTTP (false).
  # Set to false when scraping from outside the cluster without a ServiceAccount token.
  secure: true
  # Service type for metrics
  service:
    type: ClusterIP
    port: 8443
    # NodePort to expose when service type is NodePort (optional, auto-assigned if empty)
    nodePort: ""
    annotations: {}

# Prometheus Operator integration
prometheus:
  # Enable Prometheus ServiceMonitor
  serviceMonitor:
    enabled: false
    # Additional labels for ServiceMonitor (e.g., for prometheus-operator selector)
    additionalLabels:
      prometheus: kube-prometheus-stack-prometheus
    # Scrape interval
    interval: 30s
    # Namespace for ServiceMonitor (defaults to release namespace)
    namespace: ""

  # Enable PodMonitor for inference pod metrics (llama.cpp /metrics)
  inferencePodMonitor:
    enabled: false
    # Additional labels for PodMonitor
    additionalLabels:
      prometheus: kube-prometheus-stack-prometheus
    # Scrape interval
    interval: 30s

  # Enable PrometheusRule for alerts
  prometheusRule:
    enabled: false
    # Additional labels for PrometheusRule
    additionalLabels:
      prometheus: kube-prometheus-stack-prometheus
      role: alert-rules
    # Namespace for PrometheusRule
    namespace: monitoring
    # Alert rules configuration
    rules:
      # GPU alerts
      gpu:
        enabled: true
        highUtilizationThreshold: 90
        highTemperatureThreshold: 85
        memoryPressureThreshold: 90
        powerLimitThreshold: 250
      # Inference service alerts
      inference:
        enabled: true

# Custom Resource Definitions
crds:
  # Install CRDs as part of chart installation
  install: true
  # Keep CRDs on chart uninstall (recommended for production)
  keep: true

# Model cache configuration
modelCache:
  # Enable persistent model cache
  enabled: true
  # Storage size for model cache
  size: 100Gi
  # Storage class (leave empty for default)
  storageClass: ""
  # Access mode: ReadWriteOnce (single-node) or ReadWriteMany (multi-node with NFS/EFS)
  accessMode: ReadWriteOnce
  # Mount path inside controller pod
  mountPath: /models
  # Annotations for the PVC (e.g., for backup policies)
  annotations: {}

# Priority classes for GPU scheduling
priorityClasses:
  # Create LLMKube priority classes (critical, high, normal, low, batch)
  enabled: true

# Image pull secrets for private registries
imagePullSecrets: []

# Name override
nameOverride: ""
fullnameOverride: ""

# Pod annotations
podAnnotations: {}

# Pod labels
podLabels: {}

# Network policies for the controller manager pod
networkPolicies:
  enabled: false
  additionalEgressCIDRs: []

