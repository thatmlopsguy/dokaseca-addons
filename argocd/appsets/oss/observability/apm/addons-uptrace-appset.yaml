---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: addons-uptrace
  namespace: argocd
spec:
  syncPolicy:
    preserveResourcesOnDeletion: false
  generators:
    - merge:
        mergeKeys: [server]
        generators:
          - clusters:
              values:
                addonChart: uptrace
                addonChartVersion: 2.0.2
                addonChartRepository: https://charts.uptrace.dev
                addonChartNamespace: monitoring
              selector:
                matchExpressions:
                  - key: enable_uptrace
                    operator: In
                    values: ['true']
          - clusters:
              selector:
                matchLabels:
                  environment: dev
              values:
                addonChartVersion: 2.0.2 # promote this
          - clusters:
              selector:
                matchLabels:
                  environment: prod
              values:
                addonChartVersion: 2.0.2
  template:
    metadata:
      name: addon-{{name}}-{{values.addonChart}}
    spec:
      project: addons
      sources:
        - repoURL: '{{metadata.annotations.addons_repo_url}}'
          targetRevision: '{{metadata.annotations.addons_repo_revision}}'
          ref: values
        - chart: '{{values.addonChart}}'
          repoURL: '{{values.addonChartRepository}}'
          targetRevision: '{{values.addonChartVersion}}'
          helm:
            releaseName: '{{values.addonChart}}'
            ignoreMissingValueFiles: true
            valueFiles:
              - $values/configs/addons/environments/default/{{values.addonChart}}/values.yaml
              - $values/configs/addons/environments/{{metadata.labels.environment}}/{{values.addonChart}}/values.yaml
              - $values/configs/addons/regions/{{metadata.labels.region}}/{{values.addonChart}}/values.yaml
              - $values/configs/addons/cluster_type//{{metadata.labels.cluster_type}}/{{values.addonChart}}/values.yaml
              - $values/configs/addons/cluster_name/{{name}}/{{values.addonChart}}/values.yaml
      destination:
        namespace: '{{values.addonChartNamespace}}'
        name: '{{name}}'
      syncPolicy:
        automated: {}
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true # Big CRDs.
