---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: addons-kai-scheduler
  namespace: argocd
spec:
  syncPolicy:
    preserveResourcesOnDeletion: false
  generators:
    - merge:
        mergeKeys: [server]
        generators:
          - clusters:
              values:
                addonChart: kai-scheduler
                addonChartVersion: v0.9.18
                addonChartRepository: ghcr.io/kai-scheduler/kai-scheduler/
                addonChartNamespace: kai-scheduler
              selector:
                matchExpressions:
                  - key: enable_kai_scheduler
                    operator: In
                    values: ['true']
          - clusters:
              selector:
                matchLabels:
                  environment: dev
              values:
                addonChartVersion: v0.9.18 # promote this
          - clusters:
              selector:
                matchLabels:
                  environment: prod
              values:
                addonChartVersion: v0.9.18
  template:
    metadata:
      name: addon-{{name}}-{{values.addonChart}}
    spec:
      project: addons
      sources:
        - repoURL: '{{metadata.annotations.addons_repo_url}}'
          targetRevision: '{{metadata.annotations.addons_repo_revision}}'
          ref: values
        - chart: '{{values.addonChart}}'
          repoURL: '{{values.addonChartRepository}}'
          targetRevision: '{{values.addonChartVersion}}'
          helm:
            releaseName: '{{values.addonChart}}'
            ignoreMissingValueFiles: true
            valueFiles:
              - $values/configs/addons/environments/default/{{values.addonChartName}}/values.yaml
              - $values/configs/addons/environments/{{metadata.labels.environment}}/{{values.addonChartName}}/values.yaml
              - $values/configs/addons/regions/{{metadata.labels.region}}/{{values.addonChartName}}/values.yaml
              - $values/configs/addons/clusters/{{name}}/{{values.addonChartName}}/values.yaml
            values: |
              kubernetesClusterDomain: '{{metadata.labels.domain}}'
      destination:
        namespace: '{{values.addonChartNamespace}}'
        name: '{{name}}'
      syncPolicy:
        automated: {}
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true # Big CRDs.
