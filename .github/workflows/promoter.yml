name: ArgoCD Promoter

on:
  # every month on the 1st at midnight
  # https://crontab.guru/#0_0_1_*_*
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch: # Allow manual triggers

jobs:
  run-promoter:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      #- uses: GitHubSecurityLab/actions-permissions/monitor@b25f731bf2f9eb9748c2e9757d366c3e72fa2109 # v1.0.2-beta8

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Run ArgoCD promoter
        run: uv run src/argocd-promoter.py update --apply
        env:
          PYTHONUNBUFFERED: 1

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code || echo "changes=true" >> "$GITHUB_OUTPUT"

      - name: Read update summary
        if: steps.git-check.outputs.changes == 'true'
        id: summary
        run: |
          if [ -f update-summary.md ]; then
            delimiter="$(openssl rand -hex 8)"
            {
              echo "summary<<${delimiter}"
              cat update-summary.md
              echo ""
              echo "${delimiter}"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.git-check.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.PAT_TOKEN }}
          commit-message: "ci: update ArgoCD addon versions"
          title: "ci: update ArgoCD addon versions"
          body: |
            This PR was automatically generated by the ArgoCD Promoter workflow.

            ## Changes
            ${{ steps.summary.outputs.summary }}

            Please review the changes before merging.
          branch: promoter-${{ github.run_id }}
          delete-branch: true
          labels: |
            automated
            dependencies
